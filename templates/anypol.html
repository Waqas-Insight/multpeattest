    const policy_category_mappings= {
        "Biodiversity":{
            "green":["Circular Economy"],
            "sdg":["Life Land", "Life Water"]

        "Climate":{

        },

            "green":["Climate", "Zero Pollution"],
            "sdg":["Climate Action"]
        },
        "Community and Culture":{
            "green":["Circular Economy", "Natural Capital", "Just Transition", "Transformation"],

        },

            "green":["Financing the Transition", "Circular Economy"],
            "sdg":["Economic Growth", "Consumption"]
        },
        "Energy":{
            "green":["Clean Energy", "Zero Pollution"],
            "sdg":["Clean Energy"]
        },

        },

        },
        "Research and Applied Sciences":{
            "green":["Circular Economy"],
            "sdg":["Consumption"]
        }
    };
    //https://www.compostnetwork.info/eu-green-deal/
    const greendeal_categories ={
        "Circular Economy":"Transition to a Circular Economy",
        "Zero Pollution":"A Zero Pollution Europe",
        "Farm to Fork":"Farm to Fork",
        "Transformation":"The Transformation of Agriculture and Rural Areas",
        "CAP":"Towards a Modernised and Simplified CAP",
        "Just Transition":"Leave No One Behind (Just Transition)",
        "Financing the Transition":"Financing the Transition",
        "Clean Energy":"Clean, Reliable, and Affordable Energy",
        "Climate":"Achieving Climate Neutrality",
        "Transport":"Sustainable Transport",
        "Natural Capital":"Preserving Europe's Natural Capital"
    };
    //https://sdgs.un.org/goals
    const sdg_categories={
        "Climate Action":"13 Climate Action",
        "Life Water":"14 Life below Water",
        "Consumption":"12 Responsible Consumption & Production",
        "Life Land":"15 Life on Land",
        "Clean Water":"6 Clean Water & Sanitation",
        "Clean Energy":"7 Affordable & Clean Energy",
        "Economic Growth":"8 Decent Work & Economic Growth",
        "Infrastructure":"9 Industry, Innovation & Infrastructure",
        "Communities":"11 Sustainable Cities & Communities"
    };

    // how to display policies
    function policyShow(policy, currentLang = 'English'){
        console.log(policy);
        const polPop = $('#policy_div');
        polPop.html('');

        if(!policy || Object.keys(policy).length === 0){
            polPop.append(`<p class="text-center my-5 text-muted fw-medium">Policy detail payload records could not be found.</p>`);
            return;
        }

        var lang = policy['language'].split(" ");
        var lang_pol = lang[0];

        var pol_title_english = policy["name"];
        var pol_title_native = policy["name_language"];
        let pol_title_to_display = (currentLang === 'English') ? pol_title_english : pol_title_native;

        // Categories pill builders
        var primary_category_english = pillNames[policy["primary_category"]];
        var primary_category_native = transl_categories[lang_pol][pillNames[policy["primary_category"]]];
        let primary_category_to_display = (currentLang === 'English') ? primary_category_english : primary_category_native;

        var categ_coll = [`<span class="badge rounded-pill ${pillDct[policy["primary_category"]]} px-3 py-2 fw-medium">${primary_category_to_display}</span>`];
        var categ_lst = policy["category"].sort();
        
        for (let c=0; c < categ_lst.length; c++){
            if(categ_lst[c] != policy["primary_category"]){
                var category_native = transl_categories[lang_pol][pillNames[categ_lst[c]]];
                let category_to_display = (currentLang === 'English') ? categ_lst[c] : category_native;
                categ_coll.push(`<span class="badge rounded-pill ${pillDct[categ_lst[c]]} px-3 py-2 fw-medium">${category_to_display}</span>`);
            }
        }
        var categs_html = categ_coll.join(" ");

        var green_goals = [];
        var sdgs = [];
        categ_lst.forEach(categ => {
            var gr = policy_category_mappings[categ]["green"];
            var sd = policy_category_mappings[categ]["sdg"];
            gr.forEach(g => green_goals.push(g));
            sd.forEach(s => sdgs.push(s));
        });
        let green_uniq = new Set(green_goals.sort());
        let sdg_uniq = new Set(sdgs.sort());
        
        var green_coll = [];
        var sdg_coll = [];
        green_uniq.forEach(goal => {
            green_coll.push(`<span class="badge bg-light text-dark border rounded-pill px-2 py-1 fw-normal">${greendeal_categories[goal]}</span>`);
        });
        sdg_uniq.forEach(goal => {
            sdg_coll.push(`<span class="badge bg-light text-dark border rounded-pill px-2 py-1 fw-normal">${sdg_categories[goal]}</span>`);
        });
        var green_html = green_coll.length ? green_coll.join(" ") : '<span class="text-muted small">None mapped</span>';
        var sdg_html = sdg_coll.length ? sdg_coll.join(" ") : '<span class="text-muted small">None mapped</span>';

        // Publishers formatting
        var publs_coll = [];
        policy["publisher"].forEach(publisher => publs_coll.push(`<span>👤 ${publisher}</span>`));
        var publs_html = publs_coll.join('<br>');
        
        const allPublishers = policy['publisher'] || [];
        let truncatedPublishers = `<span>👤 ${allPublishers[0]}</span>`;
        
        var publisher_section_html = `
            <div class="publisher-list-container text-secondary small d-inline-flex align-items-center gap-2">
                <span class="publisher-text truncated-version">${truncatedPublishers}</span>
                ${ allPublishers.length > 1 ? `<span class="ellipsis-placeholder fw-bold">...</span>` : '' }
                <span class="publisher-text full-version hidden">${publs_html}</span>
                <button class="publisher-more-less-button btn btn-link p-0 text-success text-decoration-none small fw-semibold hidden" style="font-size:0.8rem;"></button>
            </div>
        `;

        // Regional framework strings
        var lvl_area_html = ``;
        var name_country_english = policy['country'];
        let name_country_to_display = '';
        if(name_country_english){
            var name_country_native = transl_countries[policy['country']][lang_pol];
            name_country_to_display = (currentLang === 'English') ? name_country_english : name_country_native;
        }
        var lvl_area_english = policy['policy_level'];
        var lvl_area_native = transl_scale[lang_pol][policy['policy_level']];
        let lvl_area_display = (currentLang === 'English') ? lvl_area_english : lvl_area_native;

        if(["European", "Global"].includes(policy['policy_level'])){
            lvl_area_html = `<span class="badge bg-white text-dark border px-2 py-1 fw-medium me-1">${flagmojis[lvl_area_display] || '🌐'} ${lvl_area_display}</span>`;
        }else{
            let flag = flagmojis[name_country_english] || '📍';
            lvl_area_html = `<span class="badge bg-white text-dark border px-2 py-1 fw-medium me-1">${flag} ${name_country_to_display} (${lvl_area_display})</span>`;
        }

        var duratn_html = ``;
        if(policy['year_from'] && policy['year_to']){
            duratn_html = `<span class="badge bg-white text-dark border px-2 py-1 fw-medium">🗓️ ${policy['year_from']} - ${policy['year_to']}</span>`;
        } else if(policy['year_from'] || policy['year_to']) {
            duratn_html = `<span class="badge bg-white text-dark border px-2 py-1 fw-medium">🗓️ ${policy['year_from'] || ''} - ${policy['year_to'] || ''}</span>`;
        }

        // Body segments text structures
        let excerpt_text = (currentLang === 'English') ? policy['excerpt_english'] : policy['excerpt'];
        let excerpt_html_to_display = excerpt_text ? `<p class="lead text-secondary fs-6 border-start border-3 ps-3 py-1 my-3 italic" style="font-style: italic;">${excerpt_text}</p>` : '';

        let abstract_text = (currentLang === 'English') ? policy['abstract_english'] : policy['abstract'];
        let abst_html_section_to_display = '';
        if (abstract_text) {
            let abst_html = abstract_text.split("\n").map(s => `<p class="text-secondary" style="line-height:1.6;">${s}</p>`).join("");
            let title = (currentLang === 'English') ? "Overview" : transl_overview[lang_pol];
            abst_html_section_to_display = `<div class="mb-4">
                <h4 class="h6 text-uppercase fw-bold text-success tracking-wider mb-2">${title}</h4>
                <div class="text-start">${abst_html}</div>
            </div>`;
        }

        let toc_text = (currentLang === 'English') ? policy['toc_english'] : policy['toc'];
        let toc_html_section_to_display = '';
        if(toc_text){
            let toc_html = toc_text.split("\n").map(l => `<p class="text-muted my-1 small ps-2 border-start border-light">${l}</p>`).join("");
            let title = (currentLang === 'English') ? "Table of Contents" : transl_toc[lang_pol];
            toc_html_section_to_display = `<div class="mb-4">
                <h4 class="h6 text-uppercase fw-bold text-secondary tracking-wider mb-2">${title}</h4>
                <div class="bg-light rounded p-3" style="max-height:250px; overflow-y:auto;">${toc_html}</div>
            </div>`;
        }

        var button_native = `<button data-lang="Native" class="btn btn-sm btn-outline-secondary px-3 hidden">${flagmojis[policy['country']] || '🏳️'} ${lang_pol}</button>`;
        var button_english = `<button data-lang="English" class="btn btn-sm btn-outline-secondary px-3 hidden">${flagmojis['United Kingdom'] || '🇬🇧'} English</button>`;
        
        let name_link_doc_to_display = (currentLang === 'English') ? 'Policy Document' : transl_policy_document[lang_pol];
        let name_link_info_to_display = (currentLang === 'English') ? 'Official Site' : transl_policy_info_page[lang_pol];

        // Modern split grid element injection template blueprint assembly
        var element = `
            <div class="d-flex flex-wrap justify-content-between align-items-center border-bottom pb-3 mb-4 gap-3">
                <div class="d-flex flex-wrap gap-2 align-items-center">
                    ${lvl_area_html}
                    ${duratn_html}
                </div>
                <div id="lang-btns" class="d-flex gap-2">
                    ${button_native}
                    ${button_english}
                </div>
            </div>

            <div class="row g-4 lg-g-5">
                
                <div class="col-12 col-lg-7 text-start">
                    <h1 class="h2 fw-bold text-dark mb-3" style="line-height: 1.25;">${pol_title_to_display}</h1>
                    
                    <div class="mb-4">
                        ${publisher_section_html}
                    </div>

                    <div class="d-flex flex-wrap gap-3 my-3">
                        <a href="${policy['data_link']}" class="btn btn-success btn-sm px-3 shadow-sm" target="_blank">
                            <i class="bi bi-download me-1"></i> ${name_link_doc_to_display} 📥
                        </a>
                        <a href="${policy['documentation_link']}" class="btn btn-outline-success btn-sm px-3" target="_blank">
                            ${name_link_info_to_display} ↗
                        </a>
                    </div>

                    ${excerpt_html_to_display}
                    <hr class="my-4 text-black-50 opacity-25">

                    <div id="abstract-content">${abst_html_section_to_display}</div>
                    <div id="toc-content">${toc_html_section_to_display}</div>

                    <div class="mt-4 pt-3 border-top">
                        <div class="mb-3">
                            <span class="d-block text-muted small fw-bold text-uppercase mb-2">Policy Classifications</span>
                            <div class="d-flex flex-wrap gap-2">${categs_html}</div>
                        </div>
                        <div class="mb-3">
                            <span class="d-block text-muted small fw-bold text-uppercase mb-2">Green Deal Focus</span>
                            <div class="d-flex flex-wrap gap-1">${green_html}</div>
                        </div>
                        <div>
                            <span class="d-block text-muted small fw-bold text-uppercase mb-2">Sustainable Development Goals (SDGs)</span>
                            <div class="d-flex flex-wrap gap-1">${sdg_html}</div>
                        </div>
                    </div>
                </div>
                
                <div class="col-12 col-lg-5">
                    <div class="card border-0 bg-light p-2 rounded-3 shadow-inner h-100 min-vh-50" style="min-height: 600px;">
                        <iframe src="https://docs.google.com/gview?embedded=true&url=${encodeURIComponent(policy['data_link'])}" 
                                class="w-100 h-100 rounded border-0" 
                                style="min-height: 580px;"
                                allow="autoplay"></iframe>
                    </div>
                </div>

            </div>`;

        polPop.append(element);

        // Setup collapsible dynamic publishers action controls
        const publisherListContainer = polPop.find('.publisher-list-container')[0];
        if (publisherListContainer && allPublishers.length > 1) { 
            const truncatedPublishersElement = publisherListContainer.querySelector('.publisher-text.truncated-version');
            const fullPublishersElement = publisherListContainer.querySelector('.publisher-text.full-version');
            const ellipsisPlaceholder = publisherListContainer.querySelector('.ellipsis-placeholder');
            const moreLessButton = publisherListContainer.querySelector('.publisher-more-less-button');

            moreLessButton.classList.remove('hidden');
            moreLessButton.textContent = '(Show All)'; 
            ellipsisPlaceholder.classList.remove('hidden');

            moreLessButton.addEventListener('click', () => {
                if (truncatedPublishersElement.classList.contains('hidden')) {
                    truncatedPublishersElement.classList.remove('hidden');
                    fullPublishersElement.classList.add('hidden');
                    ellipsisPlaceholder.classList.remove('hidden'); 
                    moreLessButton.textContent = '(Show All)';
                } else {
                    truncatedPublishersElement.classList.add('hidden');
                    fullPublishersElement.classList.remove('hidden');
                    ellipsisPlaceholder.classList.add('hidden'); 
                    moreLessButton.textContent = '(Hide)';
                }
            });
        }

        // Toggle multi-language interface buttons visibility mapping
        if (lang_pol !== "English") {
            const button_english_el = polPop.find('#lang-btns button[data-lang="English"]')[0];
            const button_native_el = polPop.find('#lang-btns button[data-lang="Native"]')[0];
            
            if(button_english_el) button_english_el.classList.remove('hidden');
            if(button_native_el) button_native_el.classList.remove('hidden');
            
            polPop.find('#lang-btns button').on('click', function() {
                const lang = $(this).data('lang');
                policyShow(policy, lang); 
            });  
        }
    }

    async function datafxn(pol_id){
        const url = `/sgpolicy/${pol_id}`;
        var pol_obj = {};
        try {
            const response = await fetch(url);
            if (!response.ok) {
            throw new Error(`Response status: ${response.status}`);
            }
            const json = await response.json();
            //console.log(json);
            pol_obj= json["result"]["policy"];
        } catch (error) {
            console.error(error.message);
        }
        policyShow(pol_obj, 'English')
        //
        //$('#policyliststore').val(JSON.stringify(polLst));
        //
        return pol_obj;
    }
    //policyShow(policy_obj, 'English');
    datafxn(pol_id);
</script>
