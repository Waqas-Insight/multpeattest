{% extends "base.html" %}

{% block title %}Project Collection{% endblock %}

{% block content %}
<div class="container my-4" style="min-height: 760px;">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            
            <div class="card border-0 bg-light p-4 p-md-5 text-center shadow-sm mb-5" style="min-height: 600px;">
                <div class="card-body p-0">
                    
                    <h1 class="fw-bold mb-4 text-dark">Project Collection</h1>
                    <p class="lead text-secondary mx-auto mb-4" style="max-width: 800px;">
                        On this page you can explore our collection of European peatland projects.
                    </p>

                    <div class="card border-0 bg-white p-4 shadow-sm mb-4">
                        
                        <div class="row justify-content-center text-start mb-0">
                            <div class="col-md-10 col-lg-8">
                                <div class="row g-0 align-items-center bg-white border" style="border-radius: 0.375rem; min-height: 42px;">
                                    
                                    <div class="col-auto d-flex align-items-center justify-content-center px-3 border-end" style="font-size: 1.1rem; user-select: none;">
                                        🔍
                                    </div>
                                    
                                    <div class="col">
                                        <input type="text" class="form-control border-0 bg-white" id="policy-search-input" placeholder="Search projects by title, description, or keywords..." onkeyup="filterProjects()" style="box-shadow: none !important;">
                                    </div>
                                    
                                    <div class="col-auto p-1">
                                        <button class="btn btn-sm btn-outline-secondary d-flex align-items-center justify-content-center px-3" type="button" onclick="clearSearch()" style="height: 32px;">
                                            Clear
                                        </button>
                                    </div>
                                    
                                </div>
                            </div>
                        </div>
                        
                    </div> 

                    <div id="projectliststore" value="{{ [] }}" style="display:none"></div>
                    
                    <div class="accordion pol-coll-div text-start mt-4" id="proj-coll-ctr"></div>
                    
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    // WFS fetch
    const wfsURL =
        'https://multipeat.insight-centre.org/geoserver/wfs' +
        '?service=WFS&version=1.1.0&request=GetFeature' +
        '&typename=multipeat:project_map_data' +
        '&propertyName=project,life_reference,start_yr,end_yr,proj_link,name' +
        '&outputFormat=application/json'; 

    fetch(wfsURL)
    .then(r => r.json())
    .then(data => {
        // Aggregate sites under projects
        const grouped = {};
        data.features.forEach(f => {
            const p = f.properties;
            if (!p.project || !p.proj_link) return;

            if (!grouped[p.project]) {
                grouped[p.project] = {
                    'project': p.project,
                    'life_reference': p.life_reference,
                    'start_yr': p.start_yr,
                    'end_yr': p.end_yr,
                    'proj_link': p.proj_link,
                    'sites': []
                };
            }
            if (p.name) {
                grouped[p.project].sites.push(p.name);
            }
        });

        // Store for filtering
        $('#projectliststore').text(JSON.stringify(grouped));

        // Initial render
        renderProjectCollection(Object.values(grouped));
    })
    .catch(err => console.error('Error loading projects:', err));

    // Render function
    function renderProjectCollection(projects) {
        const projs_div = $('#proj-coll-ctr');
        projs_div.empty();

        if (projects.length === 0) {
            projs_div.append('<div class="text-center text-muted my-4">No matching projects found.</div>');
            return;
        }

        projects.forEach((p, i) => {
            const siteList = p.sites.length
                ? `<ul class="mb-0 ps-3">${p.sites.map(s => `<li class="text-muted small">${s}</li>`).join('')}</ul>`
                : '<p class="text-muted small mb-0"><i>No site names available</i></p>';

            const links_html = `
                <button class="btn btn-success btn-sm">
                <a href="${p.proj_link}" class="px-3 text-white text-decoration-none fw-semibold" target="_blank">
                    Project Page ↗
                </a>
                </button>`;

            // Completely Flat Card Configuration (immune to external stylesheet hover rules)
            projs_div.append(`
                <div class="card mb-2 border rounded text-start" style="transform: none !important; margin-top: 0 !important; margin-bottom: 8px !important; padding: 0 !important; box-shadow: none !important;">
                    <div class="card-header bg-white p-0 border-0">
                        <button class="accordion-button collapsed bg-white text-dark" type="button" 
                                data-bs-toggle="collapse" 
                                data-bs-target="#projcollapse${i}" 
                                aria-expanded="false" 
                                aria-controls="projcollapse${i}" 
                                style="box-shadow: none !important; transform: none !important; padding: 1.25rem !important;">
                            <div class="w-100">
                                <h5 class="mb-1 text-dark fw-bold" style="font-size: 1.1rem; line-height: 1.4;">${p.project}</h5>
                                <small class="text-secondary fw-normal d-block mt-1">${p.life_reference || 'N/A'}</small>
                            </div>
                        </button>
                    </div>
                    <div id="projcollapse${i}" class="accordion-collapse collapse">
                        <div class="card-body bg-light border-top p-4">
                            
                            <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">
                                <div>${links_html}</div>
                                <div class="text-muted small fw-semibold">
                                    📅 Duration: <span class="text-dark">${p.start_yr} — ${p.end_yr}</span>
                                </div>
                            </div>
                            
                            <div class="bg-white p-3 rounded border-start border-3 shadow-sm" style="border-color: #5C93AC;">
                                <p class="fw-bold small mb-2 text-uppercase tracking-wider" style="color: #5C93AC;">Associated Sites</p>
                                ${siteList}
                            </div>
                            
                        </div>
                    </div>
                </div>
            `);
        });
    }

    // Search & filter function
    function filterProjects() {
        const projectObj = JSON.parse($('#projectliststore').text());
        const projects = Object.values(projectObj);

        const searchTerm = document.getElementById('policy-search-input')
                               .value.toLowerCase().trim();

        let filteredProjects = projects;

        if (searchTerm !== '') {
            filteredProjects = projects.filter(p => {
                const projectMatch = p.project && p.project.toLowerCase().includes(searchTerm);
                const referenceMatch = p.life_reference && p.life_reference.toLowerCase().includes(searchTerm);
                const siteMatch = p.sites && p.sites.some(site => site.toLowerCase().includes(searchTerm));
                const yearMatch = (p.start_yr && p.start_yr.toString().includes(searchTerm)) ||
                                  (p.end_yr && p.end_yr.toString().includes(searchTerm));
                return projectMatch || referenceMatch || siteMatch || yearMatch;
            });
        }

        renderProjectCollection(filteredProjects);
    }

    // Clear search input
    function clearSearch() {
        document.getElementById('policy-search-input').value = '';
        filterProjects();
    }
</script>

{% endblock %}
